<!DOCTYPE html>
<html>
<head>
  <script>
    const params = new URLSearchParams(window.location.search);
    const query = params.get("q");

    if (query) {
      const formatted = query.replace(/%20|\s+/g, "-");
      const target = "https://example.com/search/" + formatted;
      window.location.href = target;
    }
  </script>
</head>
